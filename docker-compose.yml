services:

  # ==============================================================
  # DATABASES
  # ==============================================================

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: infra-postgres
    restart: unless-stopped
    shm_size: '256mb'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - infra_postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c shared_preload_libraries=timescaledb
        -c timescaledb.max_background_workers=8
        -c max_connections=${POSTGRES_MAX_CONNECTIONS:-200}
        -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
        -c work_mem=${POSTGRES_WORK_MEM:-16MB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - infra_shared
    profiles:
      - postgres

  redis:
    image: redis:8-alpine
    container_name: infra-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    command: >
      sh -c "
        if [ x$$REDIS_PASSWORD != x ]; then
          redis-server --appendonly yes --appendfsync everysec --maxmemory $${REDIS_MAXMEMORY:-512mb} --maxmemory-policy $${REDIS_MAXMEMORY_POLICY:-noeviction} --requirepass $$REDIS_PASSWORD
        else
          redis-server --appendonly yes --appendfsync everysec --maxmemory $${REDIS_MAXMEMORY:-512mb} --maxmemory-policy $${REDIS_MAXMEMORY_POLICY:-noeviction}
        fi
      "
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - infra_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - infra_shared
    profiles:
      - redis

  mongodb:
    image: mongo:8.0
    container_name: infra-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}
    command: mongod --auth
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - infra_mongodb_data:/data/db
      - infra_mongodb_config:/data/configdb
      - ./init/mongo:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - infra_shared
    profiles:
      - mongodb

  mysql:
    image: mysql:8.0
    container_name: infra-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - infra_mysql_data:/var/lib/mysql
      - ./init/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - infra_shared
    profiles:
      - mysql

  minio:
    image: minio/minio:latest
    container_name: infra-minio
    command: server /data --console-address ":9201"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9200}:9000"
      - "${MINIO_CONSOLE_PORT:-9201}:9201"
    volumes:
      - infra_minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra_shared
    profiles:
      - minio

  # ==============================================================
  # ADMIN TOOLS
  # 用法: --profile admin 同时需指定对应数据库 profile
  # 例如: --profile postgres --profile admin
  # ==============================================================

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: infra-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - infra_pgadmin_data:/var/lib/pgadmin
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./config/pgadmin/pgpass:/pgpass:ro
    networks:
      - infra_shared
    profiles:
      - admin

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: infra-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: infra-mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 256M
    ports:
      - "${PHPMYADMIN_PORT:-5051}:80"
    networks:
      - infra_shared
    profiles:
      - admin

  mongo-express:
    image: mongo-express:latest
    container_name: infra-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-admin}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin}@infra-mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "${MONGO_EXPRESS_PORT:-5052}:8081"
    networks:
      - infra_shared
    profiles:
      - admin

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: infra-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:infra-redis:6379:0${REDIS_PASSWORD:+:${REDIS_PASSWORD}}
    ports:
      - "${REDIS_COMMANDER_PORT:-5053}:8081"
    networks:
      - infra_shared
    profiles:
      - admin

  # ==============================================================
  # REVERSE PROXY
  # 用法: make up-caddy
  # network_mode: host → 可直接访问宿主机 localhost（dev server 在宿主机跑）
  # 首次启动 Caddy 会自动生成本地 CA 并安装到系统信任库（需要 sudo 密码）
  # ==============================================================

  caddy:
    image: caddy:2-alpine
    container_name: infra-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - infra_caddy_data:/data
      - infra_caddy_config:/config
    profiles:
      - caddy

  # ==============================================================
  # CONTAINER MANAGEMENT
  # ==============================================================

  portainer:
    image: portainer/portainer-ce:latest
    container_name: infra-portainer
    restart: unless-stopped
    ports:
      - "${PORTAINER_PORT:-9000}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - infra_portainer_data:/data
    networks:
      - infra_shared
    profiles:
      - portainer

  # ==============================================================
  # BACKUP STACK
  # 用法: --profile backup
  # ofelia 常驻 + smart-backup-db 常驻容器（sleep infinity），ofelia 通过 job-exec 定时触发 backup.sh
  # ==============================================================

  ofelia:
    image: mcuadros/ofelia:latest
    container_name: infra-ofelia
    restart: unless-stopped
    command: daemon --docker
    environment:
      TZ: ${TZ:-Asia/Kuala_Lumpur}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - infra_shared
    profiles:
      - backup

  smart-backup-db:
    build:
      context: ./config/smart-backup-db
    image: infra-smart-backup:latest
    container_name: infra-smart-backup
    restart: unless-stopped
    # 常驻睡眠；备份由 ofelia 通过 job-exec 触发 /opt/smart-backup-db/backup.sh
    entrypoint: ["sleep", "infinity"]
    volumes:
      - ./config/smart-backup-db/config.sh:/opt/smart-backup-db/config.sh:ro
      - ./config/smart-backup-db/credentials/my.cnf:/root/.my.cnf:ro
      - ./config/smart-backup-db/credentials/pgpass:/root/.pgpass:ro
      - ./data/smart-backup-db/backups:/var/backups/db
      - ./data/smart-backup-db/logs:/var/log/smart-backup-db
      # DESTINATION=s3 时取消注释：
      # - ~/.aws:/root/.aws:ro
    environment:
      TZ: ${TZ:-Asia/Kuala_Lumpur}
    networks:
      - infra_shared
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.smart-backup-db.schedule: "${BACKUP_CRON_SCHEDULE:-0 0 3 * * *}"
      ofelia.job-exec.smart-backup-db.command: "/opt/smart-backup-db/backup.sh"
      ofelia.job-exec.smart-backup-db.no-overlap: "true"
    profiles:
      - backup

# ==============================================================
# NETWORKS
# ==============================================================
networks:
  infra_shared:
    name: infra_shared
    driver: bridge

# ==============================================================
# VOLUMES
# ==============================================================
volumes:
  infra_minio_data:
  infra_postgres_data:
  infra_redis_data:
  infra_mongodb_data:
  infra_mongodb_config:
  infra_mysql_data:
  infra_pgadmin_data:
  infra_portainer_data:
  infra_caddy_data:
  infra_caddy_config:
